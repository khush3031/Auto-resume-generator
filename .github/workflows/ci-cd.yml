name: CI / CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ─────────────────────────────────────────────────────────────
  # CI — build both apps and verify nothing is broken
  # ─────────────────────────────────────────────────────────────
  build:
    name: Build & Type-check
    runs-on: ubuntu-latest

    env:
      # Skip Puppeteer Chromium download in CI — not needed for builds
      PUPPETEER_SKIP_CHROMIUM_DOWNLOAD: "true"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Cache pnpm store
        uses: actions/cache@v4
        with:
          path: ~/.local/share/pnpm/store
          key: pnpm-${{ runner.os }}-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            pnpm-${{ runner.os }}-

      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Build API
        run: pnpm --filter resumeforge-api build

      - name: Build Web
        run: pnpm --filter resumeforge-web build
        env:
          NEXT_PUBLIC_API_URL: ${{ secrets.NEXT_PUBLIC_API_URL }}

  # ─────────────────────────────────────────────────────────────
  # CD — trigger Render deploys (only on push to main)
  # ─────────────────────────────────────────────────────────────
  deploy:
    name: Deploy to Render
    needs: build
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest

    steps:
      - name: Deploy API
        run: |
          curl -f -X POST "${{ secrets.RENDER_DEPLOY_HOOK_API }}" \
            --silent --show-error

      - name: Deploy Web
        run: |
          curl -f -X POST "${{ secrets.RENDER_DEPLOY_HOOK_WEB }}" \
            --silent --show-error
