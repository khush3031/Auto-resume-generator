<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>{{fullName}} - Resume</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=Lato:wght@300;400;700&display=swap');
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: 'Lato', sans-serif; color: #2c2c2c; background: #fff; }
  .page { width: 794px; margin: 0 auto; }
  .page::after { content: ''; display: table; clear: both; }
  .sidebar { float: left; width: 260px; background: #1a2e4a; color: #fff; padding: 40px 24px; }
  .sidebar h1 { font-family: 'Playfair Display', serif; font-size: 22px; font-weight: 700; line-height: 1.3; margin-bottom: 4px; color: #fff; }
  .sidebar .job-title { font-size: 12px; font-weight: 300; letter-spacing: 2px; text-transform: uppercase; color: #8fb3d4; margin-bottom: 28px; }
  .sidebar-section { margin-bottom: 28px; }
  .sidebar-section h2 { font-size: 10px; font-weight: 700; letter-spacing: 2.5px; text-transform: uppercase; color: #8fb3d4; margin-bottom: 12px; border-bottom: 1px solid #2e4a6a; padding-bottom: 6px; }
  .contact-item { font-size: 12px; margin-bottom: 7px; color: #c8dae8; line-height: 1.5; }
  .skill-bar { margin-bottom: 10px; }
  .skill-bar span { font-size: 12px; color: #c8dae8; display: block; margin-bottom: 4px; }
  .bar-track { height: 3px; background: #2e4a6a; border-radius: 2px; }
  .bar-fill { height: 3px; background: #8fb3d4; border-radius: 2px; }
  .lang-item { font-size: 12px; color: #c8dae8; margin-bottom: 5px; display: flex; justify-content: space-between; }
  /* Main uses BFC — stays beside sidebar while sidebar exists, expands full width after */
  .main { overflow: hidden; padding: 40px 36px; }
  .summary-text { font-size: 13px; line-height: 1.8; color: #444; margin-bottom: 32px; padding-bottom: 24px; border-bottom: 2px solid #1a2e4a; }
  .main-section { margin-bottom: 28px; }
  .main-section h2 { font-family: 'Playfair Display', serif; font-size: 16px; color: #1a2e4a; margin-bottom: 16px; display: flex; align-items: center; gap: 10px; }
  .main-section h2::after { content: ''; flex: 1; height: 1px; background: #dce6ef; }
  .entry { margin-bottom: 18px; }
  .entry-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 3px; }
  .entry-title { font-size: 13px; font-weight: 700; color: #1a2e4a; }
  .entry-date { font-size: 11px; color: #8fb3d4; font-style: italic; }
  .entry-subtitle { font-size: 12px; color: #555; font-weight: 300; margin-bottom: 6px; }
  .entry ul { padding-left: 16px; }
  .entry ul li { font-size: 12px; color: #555; line-height: 1.7; margin-bottom: 3px; }
  /* Sidebar block overrides — block builders emit inline styles unreadable on dark bg */
  .sidebar span[style]  { color: #8fb3d4 !important; }
  .sidebar div[style]   { color: #c8dae8 !important; }
  .sidebar strong       { color: #fff !important; }
  @media print { body { -webkit-print-color-adjust: exact; print-color-adjust: exact; } .page { margin: 0; } }
</style>
</head>
<body>
<div class="page">
  <div class="sidebar">
    <h1>{{fullName}}</h1>
    <div class="job-title">{{jobTitle}}</div>
    <div class="sidebar-section">
      <h2>Contact</h2>
      <div class="contact-item">{{email}}</div>
      <div class="contact-item">{{phone}}</div>
      <div class="contact-item">{{location}}</div>
      <div class="contact-item">{{linkedin}}</div>
      <div class="contact-item">{{website}}</div>
    </div>
    <div class="sidebar-section">
      <h2>Skills</h2>
      {{skillsBlock}}
    </div>
    <div class="sidebar-section">
      <h2>Languages</h2>
      {{languagesBlock}}
    </div>
    <div class="sidebar-section">
      <h2>Education</h2>
      {{educationBlocks}}
    </div>
  </div>
  <div class="main">
    <div class="summary-text">{{summary}}</div>
    <div class="main-section">
      <h2>Experience</h2>
      {{experienceBlocks}}
    </div>
    <div class="main-section" style="display:{{projectsSectionDisplay}}">
      <h2>Projects</h2>
      {{projectBlocks}}
    </div>
    <div class="main-section">
      <h2>Certifications</h2>
      {{certificationBlocks}}
    </div>
  </div>
</div>
</body>
</html>
