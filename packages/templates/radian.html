<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Radian Resume</title>
  <style>
    :root {
      --accent: var(--resume-accent-color, #db2777);
      --ink: #2a1830;
      --muted: #6e5a75;
      --line: #efd9e6;
      --soft: #fff8fc;
      --hero-deep: #3f1730;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: #faf0f5; color: var(--ink); font-family: "Aptos", "Segoe UI", Arial, sans-serif; }
    .page { width: 794px; min-height: 1123px; margin: 0 auto; background: #ffffff; }
    .shell { padding: 30px 34px 28px; }
    .hero {
      border: 1px solid var(--line);
      border-radius: 28px;
      padding: 24px 24px 20px;
      background:
        radial-gradient(circle at top right, rgba(219, 39, 119, 0.22), transparent 34%),
        linear-gradient(135deg, rgba(63, 23, 48, 0.05) 0%, rgba(219, 39, 119, 0.03) 100%);
      margin-bottom: 18px;
    }
    .hero-top {
      display: flex;
      justify-content: space-between;
      gap: 20px;
      align-items: flex-start;
      margin-bottom: 14px;
    }
    .name { font-size: 35px; line-height: 0.98; font-weight: 800; letter-spacing: -0.03em; margin-bottom: 8px; }
    .role {
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: 0.22em;
      color: var(--accent);
      font-weight: 800;
    }
    .contact-grid {
      flex: 0 0 250px;
      display: grid;
      gap: 6px;
      font-size: 9.2px;
      line-height: 1.2;
      color: var(--muted);
      justify-items: end;
    }
    .contact-grid span { white-space: nowrap; }
    .summary { max-width: 630px; font-size: 12.5px; line-height: 1.76; color: #4b334f; }
    .body { display: grid; grid-template-columns: 1.06fr 0.94fr; gap: 18px; }
    .section { margin-bottom: 16px; }
    .section-title {
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: 0.2em;
      color: var(--accent);
      font-weight: 800;
      margin-bottom: 10px;
    }
    .panel {
      border: 1px solid var(--line);
      border-radius: 22px;
      background: #ffffff;
      padding: 14px 16px 12px;
      box-shadow: 0 14px 34px rgba(86, 21, 61, 0.05);
    }
    .panel-soft {
      border: 1px solid var(--line);
      border-radius: 22px;
      background: linear-gradient(180deg, rgba(219, 39, 119, 0.08), rgba(219, 39, 119, 0.02));
      padding: 14px 16px 12px;
    }

    @media print {
      body {
        -webkit-print-color-adjust: exact;
        print-color-adjust: exact;
      }
      .page {
        margin: 0;
      }
    }
  </style>
</head>
<body>
  <div class="page">
    <div class="shell">
      <header class="hero">
        <div class="hero-top">
          <div>
            <div class="name">{{fullName}}</div>
            <div class="role">{{jobTitle}}</div>
          </div>
          <div class="contact-grid">
            <span>{{email}}</span>
            <span>{{phone}}</span>
            <span>{{location}}</span>
            <span>{{linkedin}}</span>
            <span>{{website}}</span>
          </div>
        </div>
        <p class="summary">{{summary}}</p>
      </header>

      <div class="body">
        <main>
          <section class="section">
            <div class="section-title">Experience</div>
            <div class="panel">{{experienceBlocks}}</div>
          </section>
          <section class="section" style="display:{{projectsSectionDisplay}}">
            <div class="section-title">Projects</div>
            <div class="panel">{{projectBlocks}}</div>
          </section>
        </main>

        <aside>
          <section class="section">
            <div class="section-title">Skills</div>
            <div class="panel-soft">{{skillsBlock}}</div>
          </section>
          <section class="section">
            <div class="section-title">Education</div>
            <div class="panel">{{educationBlocks}}</div>
          </section>
          <section class="section">
            <div class="section-title">Certifications</div>
            <div class="panel-soft">{{certificationBlocks}}</div>
          </section>
          <section class="section">
            <div class="section-title">Languages</div>
            <div class="panel">{{languagesBlock}}</div>
          </section>
        </aside>
      </div>
    </div>
  </div>
</body>
</html>
