<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ATS Friendly Resume</title>
  <style>
    body { margin: 0; font-family: 'Noto Sans', Arial, sans-serif; background: #ffffff; color: #111111; }
    .page { width: 794px; max-width: 794px; margin: 0 auto; padding: 40px; overflow: hidden; }
    .section { margin-bottom: 28px; }
    h1 { margin: 0 0 12px; font-size: 2.6rem; font-weight: 700; }
    h2 { margin: 0 0 14px; font-size: 1rem; font-weight: 700; border-bottom: 1px solid #e5e7eb; padding-bottom: 8px; }
    p, li { margin: 0 0 12px; line-height: 1.7; }
    ul { margin-left: 20px; }
    .meta { display: flex; flex-wrap: wrap; gap: 14px; font-size: 0.95rem; color: #374151; }
    .label { font-weight: 700; }
    @media print { .page { padding: 20px; } }
  </style>
</head>
<body>
  <div class="page">
    <header class="section">
      <h1>{{fullName}}</h1>
      <div class="meta">
        <span>{{jobTitle}}</span>
        <span>{{location}}</span>
        <span>{{email}}</span>
        <span>{{phone}}</span>
      </div>
    </header>
    <section class="section">
      <h2>Professional Summary</h2>
      <p>{{summary}}</p>
    </section>
    <section class="section">
      <h2>Experience</h2>
      {{experienceBlocks}}
    </section>
    <section class="section">
      <h2>Education</h2>
      {{educationBlocks}}
    </section>
    <section class="section">
      <h2>Skills</h2>
      {{skillsBlock}}
    </section>
    <section class="section">
      <h2>Languages</h2>
      {{languagesBlock}}
    </section>
    <section class="section" style="display:{{projectsSectionDisplay}}">
      <h2>Projects</h2>
      {{projectBlocks}}
    </section>
    <section class="section">
      <h2>Certifications</h2>
      {{certificationBlocks}}
    </section>
  </div>
</body>
</html>
