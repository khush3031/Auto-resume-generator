<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Crimson Resume</title>
  <style>
    :root { --accent: var(--resume-accent-color, #b91c1c); }
    * { box-sizing: border-box; }
    body { margin: 0; font-family: 'Georgia', 'Times New Roman', serif; color: #1a1a1a; background: #fff; }
    .page { width: 794px; max-width: 794px; margin: 0 auto; padding: 0; background: #fff; }
    /* Header band */
    .header {
      background: var(--accent);
      padding: 32px 44px 28px;
      color: #fff;
    }
    .header-name { margin: 0; font-size: 2.6rem; font-weight: 700; letter-spacing: -0.01em; }
    .header-role { margin: 6px 0 0; font-size: 1.05rem; color: rgba(255,255,255,0.78); letter-spacing: 0.06em; }
    .header-contact {
      display: flex; flex-wrap: wrap; gap: 16px;
      margin-top: 18px; font-size: 0.85rem; color: rgba(255,255,255,0.85);
    }
    .header-contact span { display: flex; align-items: center; gap: 5px; }
    /* Body: two-column layout */
    .body { display: flex; gap: 0; }
    .sidebar {
      width: 230px; min-width: 230px;
      background: #fafafa;
      border-right: 1px solid #f0f0f0;
      padding: 28px 20px;
    }
    .main { flex: 1; padding: 28px 32px; }
    /* Section titles */
    .sidebar-title {
      font-size: 0.7rem; letter-spacing: 0.18em; text-transform: uppercase;
      color: var(--accent); font-weight: 700; margin: 0 0 10px;
      padding-bottom: 5px; border-bottom: 2px solid var(--accent);
    }
    .section-title {
      font-size: 0.72rem; letter-spacing: 0.18em; text-transform: uppercase;
      color: var(--accent); font-weight: 700; margin: 0 0 12px;
      padding-bottom: 5px; border-bottom: 1.5px solid #e5e7eb;
    }
    .sidebar-block { margin-bottom: 24px; }
    .section { margin-bottom: 26px; }
    .sidebar p, .sidebar li { font-size: 0.87rem; line-height: 1.75; margin: 0 0 6px; color: #374151; }
    .section p, .section li { font-size: 0.92rem; line-height: 1.75; color: #374151; }
    ul { margin: 4px 0; padding-left: 16px; }
    /* Override builder inline styles in sidebar */
    .sidebar span[style] { color: #374151 !important; }
    .sidebar strong { color: #111 !important; }
    @media print { body { -webkit-print-color-adjust: exact; print-color-adjust: exact; } .page { margin: 0; } }
  </style>
</head>
<body>
  <div class="page">
    <header class="header">
      <h1 class="header-name">{{fullName}}</h1>
      <p class="header-role">{{jobTitle}}</p>
      <div class="header-contact">
        <span>{{email}}</span>
        <span>{{phone}}</span>
        <span>{{location}}</span>
        <span>{{linkedin}}</span>
        <span>{{website}}</span>
      </div>
    </header>

    <div class="body">
      <!-- Sidebar -->
      <aside class="sidebar">
        <div class="sidebar-block">
          <p class="sidebar-title">Skills</p>
          {{skillsBlock}}
        </div>
        <div class="sidebar-block">
          <p class="sidebar-title">Languages</p>
          {{languagesBlock}}
        </div>
        <div class="sidebar-block">
          <p class="sidebar-title">Certifications</p>
          {{certificationBlocks}}
        </div>
      </aside>

      <!-- Main -->
      <main class="main">
        <section class="section">
          <h2 class="section-title">Summary</h2>
          <p>{{summary}}</p>
        </section>

        <section class="section">
          <h2 class="section-title">Experience</h2>
          {{experienceBlocks}}
        </section>

        <section class="section">
          <h2 class="section-title">Education</h2>
          {{educationBlocks}}
        </section>

        <section class="section" style="display:{{projectsSectionDisplay}}">
          <h2 class="section-title">Projects</h2>
          {{projectBlocks}}
        </section>
      </main>
    </div>
  </div>
</body>
</html>
