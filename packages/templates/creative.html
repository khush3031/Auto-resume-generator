<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Creative Resume</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Nunito:ital,wght@0,300;0,400;0,600;0,700;0,800;1,400&display=swap');
    :root { --accent: var(--resume-accent-color, #1a1a2e); }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Nunito', sans-serif; background: #fff; color: #1f2937; }
    .page { width: 794px; max-width: 794px; min-height: 1123px; margin: 0 auto; display: grid; grid-template-columns: 200px 1fr; align-items: stretch; overflow: hidden; }
    .sidebar { background: var(--accent); padding: 0; display: flex; flex-direction: column; min-height: 100%; align-self: stretch; overflow: hidden; }
    .s-accent { height: 10px; background: linear-gradient(90deg, #ff6b6b, #f7d56e, #4ecdc4); }
    .s-inner { padding: 36px 20px; flex: 1; }
    .avatar-ring { width: 80px; height: 80px; border-radius: 50%; background: linear-gradient(135deg, #ff6b6b, #4ecdc4); padding: 3px; margin: 0 auto 20px; }
    .avatar-inner { width: 100%; height: 100%; border-radius: 50%; background: rgba(0,0,0,0.25); display: flex; align-items: center; justify-content: center; font-size: 24px; font-weight: 800; color: #fff; }
    .s-name { font-size: 16px; font-weight: 800; color: #fff; text-align: center; line-height: 1.2; margin-bottom: 4px; }
    .s-title { font-size: 10px; font-weight: 400; color: #f7d56e; text-align: center; letter-spacing: 1.5px; text-transform: uppercase; margin-bottom: 28px; }
    .s-section { margin-bottom: 22px; }
    .s-label { font-size: 9px; font-weight: 800; letter-spacing: 2.5px; text-transform: uppercase; color: #4ecdc4; margin-bottom: 8px; }
    .s-item { font-size: 11px; color: rgba(255,255,255,0.82); line-height: 1.7; margin-bottom: 3px; }
    .s-divider { height: 1px; background: rgba(255,255,255,0.15); margin: 14px 0; }
    .tag { display: inline-block; font-size: 10.5px; color: #1f2937; background: #f7d56e; padding: 3px 9px; border-radius: 3px; margin: 3px 2px 3px 0; font-weight: 700; }
    .tag-alt { background: #4ecdc4; }
    .tag-alt2 { background: #ff6b6b; }
    .main { padding: 0; min-width: 0; overflow: hidden; max-width: 100%; }
    .main-accent { height: 10px; background: linear-gradient(90deg, #4ecdc4, #f7d56e, #ff6b6b); }
    .main-body { padding: 32px 36px; }
    .m-section { margin-bottom: 26px; }
    .m-label { font-size: 13px; font-weight: 800; color: #1f2937; margin-bottom: 12px; display: flex; align-items: center; gap: 10px; }
    .m-label::after { content: ''; flex: 1; height: 2px; background: linear-gradient(90deg, #ff6b6b, transparent); }
    .summary-box { background: #f0fafa; border-radius: 8px; padding: 14px 18px; font-size: 13px; line-height: 1.8; color: #374151; }
    .exp-card { background: #fafafa; border-radius: 6px; border: 1px solid #f0f0f0; border-left: 4px solid #ff6b6b; padding: 14px 16px; margin-bottom: 12px; }
    .exp-top { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 2px; }
    .exp-role { font-size: 13px; font-weight: 700; color: #1f2937; }
    .exp-badge { font-size: 10px; background: #fff0f0; color: #ff6b6b; padding: 2px 8px; border-radius: 99px; font-weight: 700; }
    .exp-co { font-size: 12px; color: #888; margin-bottom: 8px; }
    .exp-list { list-style: none; }
    .exp-list li { font-size: 12px; color: #4b5563; line-height: 1.7; padding-left: 14px; position: relative; margin-bottom: 2px; }
    .exp-list li::before { content: '→'; position: absolute; left: 0; color: #4ecdc4; font-size: 11px; }
    .edu-card { background: #fffdf0; border-radius: 6px; border-left: 4px solid #f7d56e; padding: 12px 16px; }
    .edu-deg { font-size: 13px; font-weight: 700; color: #1f2937; }
    .edu-uni { font-size: 12px; color: #666; }
    .edu-year { font-size: 11px; color: #f7a800; font-weight: 700; margin-top: 3px; }
    /* Sidebar block overrides: block builders emit inline styles; !important is required here */
    .sidebar span[style]  { background: rgba(255,255,255,0.13) !important; color: #fff !important; border-radius: 4px !important; }
    .sidebar div[style]   { color: rgba(255,255,255,0.82) !important; }
    .sidebar a[style]     { color: #4ecdc4 !important; }
    .sidebar strong       { color: #fff !important; }
    @media print { body { -webkit-print-color-adjust: exact; print-color-adjust: exact; } .page { margin: 0; } }
  </style>
</head>
<body>
  <div class="page">
    <div class="sidebar">
      <div class="s-accent"></div>
      <div class="s-inner">
        <div class="avatar-ring"><div class="avatar-inner">{{initials}}</div></div>
        <div class="s-name">{{fullName}}</div>
        <div class="s-title">{{jobTitle}}</div>
        <div class="s-divider"></div>
        <div class="s-section">
          <div class="s-label">Contact</div>
          <div class="s-item">{{email}}</div>
          <div class="s-item">{{phone}}</div>
          <div class="s-item">{{location}}</div>
          <div class="s-item">{{linkedin}}</div>
        </div>
        <div class="s-divider"></div>
        <div class="s-section">
          <div class="s-label">Skills</div>
          {{skillsBlock}}
        </div>
        <div class="s-divider"></div>
        <div class="s-section">
          <div class="s-label">Languages</div>
          {{languagesBlock}}
        </div>
        <div class="s-divider"></div>
        <div class="s-section">
          <div class="s-label">Certifications</div>
          {{certificationBlocks}}
        </div>
      </div>
    </div>
    <div class="main">
      <div class="main-accent"></div>
      <div class="main-body">
        <div class="m-section">
          <div class="m-label">About Me</div>
          <div class="summary-box">{{summary}}</div>
        </div>
        <div class="m-section">
          <div class="m-label">Experience</div>
          {{experienceBlocks}}
        </div>
        <div class="m-section">
          <div class="m-label">Education</div>
          {{educationBlocks}}
        </div>
        <div class="m-section" style="display:{{projectsSectionDisplay}}">
          <div class="m-label">Projects</div>
          {{projectBlocks}}
        </div>
      </div>
    </div>
  </div>
</body>
</html>
