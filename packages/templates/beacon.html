<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Beacon Resume</title>
  <style>
    :root {
      --accent: var(--resume-accent-color, #394867);
      --ink: #16202a;
      --muted: #5d6b79;
      --line: #d9e1e8;
      --soft: #f8fafc;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: #f3f5f7; color: var(--ink); font-family: Arial, sans-serif; }
    .page { width: 794px; min-height: 1123px; margin: 0 auto; background: #ffffff; }
    .shell { padding: 44px 44px 42px; }
    .hero {
      border-left: 5px solid var(--accent);
      padding-left: 20px;
      margin-bottom: 28px;
    }
    .name { font-size: 32px; line-height: 1; font-weight: 800; margin-bottom: 8px; }
    .role { font-size: 13px; color: var(--accent); text-transform: uppercase; letter-spacing: 0.18em; margin-bottom: 12px; }
    .contact-row {
      display: flex;
      flex-wrap: wrap;
      gap: 10px 18px;
      font-size: 11.5px;
      color: var(--muted);
      margin-bottom: 12px;
    }
    .summary { font-size: 13px; line-height: 1.78; color: #334155; max-width: 620px; }
    .layout { display: grid; grid-template-columns: 1.18fr 0.82fr; gap: 26px; }
    .section { margin-bottom: 22px; }
    .section-title {
      font-size: 11px;
      font-weight: 800;
      letter-spacing: 0.16em;
      text-transform: uppercase;
      color: var(--accent);
      padding-bottom: 7px;
      border-bottom: 1px solid var(--line);
      margin-bottom: 12px;
    }
    .stack { background: var(--soft); border: 1px solid var(--line); padding: 14px 16px; }

    @media print {
      body {
        -webkit-print-color-adjust: exact;
        print-color-adjust: exact;
      }

      .page {
        margin: 0;
      }
    }
  </style>
</head>
<body>
  <div class="page">
    <div class="shell">
      <header class="hero">
        <div class="name">{{fullName}}</div>
        <div class="role">{{jobTitle}}</div>
        <div class="contact-row">
          <span>{{email}}</span>
          <span>{{phone}}</span>
          <span>{{location}}</span>
          <span>{{linkedin}}</span>
          <span>{{website}}</span>
        </div>
        <p class="summary">{{summary}}</p>
      </header>

      <div class="layout">
        <main>
          <section class="section">
            <div class="section-title">Experience</div>
            {{experienceBlocks}}
          </section>

          <section class="section" style="display:{{projectsSectionDisplay}}">
            <div class="section-title">Projects</div>
            {{projectBlocks}}
          </section>
        </main>

        <aside>
          <section class="section stack">
            <div class="section-title">Skills</div>
            {{skillsBlock}}
          </section>

          <section class="section stack">
            <div class="section-title">Education</div>
            {{educationBlocks}}
          </section>

          <section class="section stack">
            <div class="section-title">Certifications</div>
            {{certificationBlocks}}
          </section>

          <section class="section stack">
            <div class="section-title">Languages</div>
            {{languagesBlock}}
          </section>
        </aside>
      </div>
    </div>
  </div>
</body>
</html>
