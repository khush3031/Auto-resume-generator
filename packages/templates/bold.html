<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Bold Resume</title>
  <style>
    :root { --accent: var(--resume-accent-color, #ef4444); }
    body { margin: 0; font-family: 'Oswald', Arial, sans-serif; background: #fff; color: #111111; }
    .page { width: 794px; max-width: 794px; margin: 0 auto; border-top: 18px solid #111111; border-bottom: 6px solid var(--accent); padding: 40px; overflow: visible; display: flex; flex-direction: column; }
    header { display: flex; justify-content: space-between; align-items: flex-end; gap: 20px; background: var(--accent); padding: 24px 40px 20px; margin: -40px -40px 28px; flex-shrink: 0; height: auto; }
    .name { margin: 0; font-size: 3rem; letter-spacing: -0.06em; color: #fff; }
    .title { margin: 0; color: rgba(255,255,255,0.85); text-transform: uppercase; letter-spacing: 0.25em; font-size: 0.95rem; }
    .meta { display: flex; flex-wrap: wrap; gap: 14px; font-size: 0.95rem; color: rgba(255,255,255,0.75); }
    .section { margin-bottom: 28px; }
    h2 { margin: 0 0 14px; font-size: 0.95rem; text-transform: uppercase; letter-spacing: 0.22em; color: #111111; }
    p, li { line-height: 1.75; margin: 0 0 12px; }
    ul { margin: 0; padding-left: 18px; }
    .skill-tag { display: inline-block; margin: 5px 8px 5px 0; padding: 8px 12px; border: 1px solid #111111; border-radius: 999px; font-size: 0.88rem; }
    .cert-entry { margin-bottom: 12px; padding-bottom: 10px; border-bottom: 1px solid rgba(0,0,0,0.08); }
    .cert-name { font-size: 12px; font-weight: 600; color: inherit; }
    .cert-meta { font-size: 11px; opacity: 0.75; margin-top: 2px; }
    @media print { .page { padding: 20px; border: none; } }
  </style>
</head>
<body>
  <div class="page">
    <header>
      <div>
        <h1 class="name">{{fullName}}</h1>
        <p class="title">{{jobTitle}}</p>
      </div>
      <div class="meta">
        <span>{{email}}</span>
        <span>{{phone}}</span>
        <span>{{location}}</span>
      </div>
    </header>
    <section class="section">
      <h2>Summary</h2>
      <p>{{summary}}</p>
    </section>
    <section class="section">
      <h2>Experience</h2>
      {{experienceBlocks}}
    </section>
    <section class="section" style="display:{{projectsSectionDisplay}}">
      <h2>Projects</h2>
      {{projectBlocks}}
    </section>
    <section class="section">
      <h2>Education</h2>
      {{educationBlocks}}
    </section>
    <section class="section">
      <h2>Skills &amp; Languages</h2>
      <div style="margin-bottom:10px;">{{skillsBlock}}</div>
      <div>{{languagesBlock}}</div>
    </section>
    <section>
      <h2>Certifications</h2>
      {{certificationBlocks}}
    </section>
  </div>
</body>
</html>
