<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Aurora Resume</title>
  <style>
    :root {
      --accent: var(--resume-accent-color, #0f766e);
      --ink: #102a2f;
      --muted: #587078;
      --line: #d7e4e2;
      --soft: #f3faf8;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: #edf7f5; color: var(--ink); font-family: 'Trebuchet MS', 'Segoe UI', sans-serif; }
    .page { width: 794px; min-height: 1123px; margin: 0 auto; background: #ffffff; }
    .hero { background: linear-gradient(135deg, var(--accent) 0%, #12303a 100%); color: #ffffff; padding: 34px 40px 30px; }
    .hero-top { display: flex; justify-content: space-between; gap: 22px; align-items: flex-start; }
    .avatar {
      width: 74px;
      height: 74px;
      border-radius: 24px;
      background: rgba(255, 255, 255, 0.18);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 28px;
      font-weight: 700;
      letter-spacing: 0.06em;
      margin-bottom: 16px;
    }
    .hero-name { font-size: 34px; line-height: 1; font-weight: 800; letter-spacing: -0.02em; margin-bottom: 8px; }
    .hero-role { font-size: 13px; letter-spacing: 0.18em; text-transform: uppercase; color: rgba(255, 255, 255, 0.8); }
    .hero-contact { text-align: right; font-size: 11.5px; line-height: 1.75; color: rgba(255, 255, 255, 0.88); }
    .hero-summary { margin-top: 18px; font-size: 13px; line-height: 1.75; max-width: 620px; color: rgba(255, 255, 255, 0.92); }
    .body { display: grid; grid-template-columns: 1.08fr 0.92fr; gap: 26px; padding: 28px 40px 34px; }
    .section { margin-bottom: 22px; }
    .section-title {
      font-size: 11px;
      font-weight: 800;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--accent);
      padding-bottom: 6px;
      border-bottom: 1px solid var(--line);
      margin-bottom: 12px;
    }
    .panel { background: var(--soft); border: 1px solid var(--line); padding: 14px 16px; }

    @media print {
      body {
        -webkit-print-color-adjust: exact;
        print-color-adjust: exact;
      }

      .page {
        margin: 0;
      }
    }
  </style>
</head>
<body>
  <div class="page">
    <header class="hero">
      <div class="hero-top">
        <div>
          <div class="avatar">{{initials}}</div>
          <div class="hero-name">{{fullName}}</div>
          <div class="hero-role">{{jobTitle}}</div>
        </div>

        <div class="hero-contact">
          <div>{{email}}</div>
          <div>{{phone}}</div>
          <div>{{location}}</div>
          <div>{{linkedin}}</div>
          <div>{{website}}</div>
        </div>
      </div>

      <p class="hero-summary">{{summary}}</p>
    </header>

    <div class="body">
      <main>
        <section class="section">
          <div class="section-title">Experience</div>
          {{experienceBlocks}}
        </section>

        <section class="section" style="display:{{projectsSectionDisplay}}">
          <div class="section-title">Projects</div>
          {{projectBlocks}}
        </section>
      </main>

      <aside>
        <section class="section panel">
          <div class="section-title">Education</div>
          {{educationBlocks}}
        </section>

        <section class="section panel">
          <div class="section-title">Skills</div>
          {{skillsBlock}}
        </section>

        <section class="section panel">
          <div class="section-title">Certifications</div>
          {{certificationBlocks}}
        </section>

        <section class="section panel">
          <div class="section-title">Languages</div>
          {{languagesBlock}}
        </section>
      </aside>
    </div>
  </div>
</body>
</html>
