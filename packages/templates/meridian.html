<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Meridian Resume</title>
  <style>
    :root {
      --accent: var(--resume-accent-color, #0f766e);
      --ink: #10252b;
      --muted: #567078;
      --line: #d7e5e3;
      --soft: #f3faf9;
      --hero-deep: #12353f;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: #eef6f5; color: var(--ink); font-family: "Aptos", "Segoe UI", Arial, sans-serif; }
    .page { width: 794px; min-height: 1123px; margin: 0 auto; background: #ffffff; }
    .shell { padding: 32px 34px 28px; }
    .hero {
      border: 1px solid var(--line);
      border-radius: 24px;
      background: linear-gradient(135deg, rgba(15, 118, 110, 0.1) 0%, rgba(18, 53, 63, 0.03) 100%);
      padding: 22px 24px 18px;
      margin-bottom: 18px;
    }
    .hero-top {
      display: flex;
      justify-content: space-between;
      gap: 20px;
      align-items: flex-start;
      margin-bottom: 12px;
    }
    .name { font-size: 34px; line-height: 0.98; font-weight: 800; letter-spacing: -0.03em; margin-bottom: 8px; }
    .role {
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: 0.22em;
      color: var(--accent);
      font-weight: 800;
    }
    .hero-contact {
      text-align: right;
      display: grid;
      gap: 6px;
      font-size: 9.2px;
      line-height: 1.2;
      color: var(--muted);
    }
    .hero-contact div { white-space: nowrap; }
    .summary { font-size: 12.5px; line-height: 1.76; color: #334155; max-width: 620px; }
    .body { display: grid; grid-template-columns: 1.14fr 0.86fr; gap: 18px; }
    .section { margin-bottom: 16px; }
    .section-title {
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: 0.2em;
      color: var(--accent);
      font-weight: 800;
      margin-bottom: 10px;
    }
    .panel {
      border: 1px solid var(--line);
      border-radius: 22px;
      background: #ffffff;
      padding: 14px 16px 12px;
      position: relative;
      overflow: hidden;
    }
    .panel::before {
      content: "";
      position: absolute;
      top: 0;
      left: 0;
      width: 5px;
      height: 100%;
      background: linear-gradient(180deg, var(--accent) 0%, var(--hero-deep) 100%);
    }
    .panel-inner { padding-left: 8px; }
    .panel-soft {
      border: 1px solid var(--line);
      border-radius: 22px;
      background: var(--soft);
      padding: 14px 16px 12px;
    }

    @media print {
      body {
        -webkit-print-color-adjust: exact;
        print-color-adjust: exact;
      }
      .page {
        margin: 0;
      }
    }
  </style>
</head>
<body>
  <div class="page">
    <div class="shell">
      <header class="hero">
        <div class="hero-top">
          <div>
            <div class="name">{{fullName}}</div>
            <div class="role">{{jobTitle}}</div>
          </div>
          <div class="hero-contact">
            <div>{{email}}</div>
            <div>{{phone}}</div>
            <div>{{location}}</div>
            <div>{{linkedin}}</div>
            <div>{{website}}</div>
          </div>
        </div>
        <p class="summary">{{summary}}</p>
      </header>

      <div class="body">
        <main>
          <section class="section">
            <div class="section-title">Experience</div>
            <div class="panel"><div class="panel-inner">{{experienceBlocks}}</div></div>
          </section>
          <section class="section" style="display:{{projectsSectionDisplay}}">
            <div class="section-title">Projects</div>
            <div class="panel"><div class="panel-inner">{{projectBlocks}}</div></div>
          </section>
        </main>

        <aside>
          <section class="section">
            <div class="section-title">Skills</div>
            <div class="panel-soft">{{skillsBlock}}</div>
          </section>
          <section class="section">
            <div class="section-title">Education</div>
            <div class="panel-soft">{{educationBlocks}}</div>
          </section>
          <section class="section">
            <div class="section-title">Certifications</div>
            <div class="panel-soft">{{certificationBlocks}}</div>
          </section>
          <section class="section">
            <div class="section-title">Languages</div>
            <div class="panel-soft">{{languagesBlock}}</div>
          </section>
        </aside>
      </div>
    </div>
  </div>
</body>
</html>
