<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Tech Pro Resume</title>

  <!-- Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Fira+Code:wght@400;500;600&display=swap" rel="stylesheet">

  <style>
    body {
      margin: 0;
      font-family: 'Inter', -apple-system, sans-serif;
      background: #f3f4f6;
      color: #374151;
      -webkit-font-smoothing: antialiased;
    }

    .preview-container {
      display: flex;
      justify-content: center;
      padding: 20px 0;
    }

    .page {
      width: 794px;
      min-height: 1123px;
      background: #ffffff;
      padding: 56px;
      box-sizing: border-box;
      border-top: 8px solid #2563eb;
      color: #1f2937;
      box-shadow: 0 10px 25px rgba(0,0,0,0.05);
    }

    /* HEADER */
    .header {
      margin-bottom: 32px;
    }

    .name {
      margin: 0;
      font-size: 2.8rem;
      font-weight: 800;
      color: #111827;
      letter-spacing: -0.03em;
      line-height: 1.1;
      text-transform: uppercase;
      word-break: break-word;
    }

    .role {
      color: #2563eb;
      font-size: 1.1rem;
      font-weight: 600;
      font-family: 'Fira Code', monospace;
      margin: 8px 0 20px;
      letter-spacing: 0.05em;
      text-transform: uppercase;
    }

    .contact-grid {
      display: flex;
      flex-wrap: wrap;
      gap: 12px 24px;
      font-size: 0.85rem;
      font-family: 'Fira Code', monospace;
      color: #4b5563;
      padding-top: 16px;
      border-top: 1px solid #e5e7eb;
    }

    .contact-grid p {
      margin: 0;
      display: inline-flex;
      align-items: center;
    }

    .contact-grid p::before {
      content: '→';
      color: #2563eb;
      margin-right: 8px;
      font-weight: 600;
    }

    /* GRID */
    .grid {
      display: grid;
      grid-template-columns: 2fr 1fr;
      gap: 48px;
    }

    /* SECTION */
    h2 {
      margin: 0 0 16px;
      font-size: 1.1rem;
      font-weight: 700;
      letter-spacing: 0.05em;
      text-transform: uppercase;
      color: #111827;
      display: flex;
      align-items: center;
    }
    
    h2::after {
      content: '';
      flex: 1;
      height: 1px;
      background: #e5e7eb;
      margin-left: 16px;
    }

    .section {
      margin-bottom: 32px;
    }

    .info {
      line-height: 1.6;
      font-size: 0.95rem;
    }

    .info p {
      margin: 0 0 12px;
    }

    /* LIST / BULLET STYLING */
    .info ul {
      list-style-type: none !important;
      padding-left: 0 !important;
      margin: 8px 0 16px 0;
    }

    .info li {
      position: relative;
      padding-left: 20px;
      margin-bottom: 6px;
      list-style-type: none !important;
    }

    .info li::before {
      content: '→';
      position: absolute;
      left: 0;
      top: 0;
      color: #2563eb;
      font-family: 'Fira Code', monospace;
      font-weight: 600;
      font-size: 0.95rem;
      line-height: inherit;
    }

    /* TAG STYLE FIX (Only for skills/languages in sidebar) */
    .side-col .info span[style] {
      background: #f8fafc !important;
      color: #0f172a !important;
      border: 1px solid #cbd5e1;
      padding: 4px 10px;
      border-radius: 6px;
      font-family: 'Fira Code', monospace;
      font-size: 0.8rem;
      font-weight: 500;
      display: inline-block;
      margin: 0 6px 8px 0;
    }

    /* PRINT FIX */
    @media print {
      body {
        -webkit-print-color-adjust: exact;
        print-color-adjust: exact;
        background: none;
      }
      .preview-container { padding: 0; display: block; }
      .page {
        margin: 0;
        box-shadow: none;
        padding: 48px;
        min-height: auto;
      }
    }
  </style>
</head>

<body>
  <div class="preview-container">
    <div class="page">

      <!-- HEADER -->
      <header class="header">
        <h1 class="name">{{fullName}}</h1>
        <p class="role">{{jobTitle}}</p>

        <div class="contact-grid">
          <p>{{email}}</p>
          <p>{{phone}}</p>
          <p>{{location}}</p>
          <p>{{website}}</p>
        </div>
      </header>

      <!-- MAIN GRID -->
      <div class="grid">

        <!-- LEFT -->
        <div class="main-col">

          <section class="section">
            <h2>Summary</h2>
            <div class="info">
              <p>{{summary}}</p>
            </div>
          </section>

          <section class="section">
            <h2>Experience</h2>
            <div class="info">{{experienceBlocks}}</div>
          </section>

          <section class="section" style="display:{{projectsSectionDisplay}}">
            <h2>Projects</h2>
            <div class="info">{{projectBlocks}}</div>
          </section>

        </div>

        <!-- RIGHT -->
        <div class="side-col">

          <section class="section">
            <h2>Skills</h2>
            <div class="info">{{skillsBlock}}</div>
          </section>

          <section class="section">
            <h2>Education</h2>
            <div class="info">{{educationBlocks}}</div>
          </section>

          <section class="section">
            <h2>Certifications</h2>
            <div class="info">{{certificationBlocks}}</div>
          </section>

          <section class="section">
            <h2>Languages</h2>
            <div class="info">{{languagesBlock}}</div>
          </section>

        </div>

      </div>
    </div>
  </div>
</body>
</html>
