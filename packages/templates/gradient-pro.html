<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Gradient Pro Resume</title>
  <style>
    body { margin: 0; font-family: 'Outfit', -apple-system, sans-serif; background: #f8fafc; color: #334155; }
    .page { width: 794px; max-width: 794px; margin: 0 auto; background: #ffffff; padding: 0; box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1); }
    
    .header { background: linear-gradient(135deg, #6366f1 0%, #a855f7 100%); color: white; padding: 48px; text-align: center; }
    .name { margin: 0 0 8px; font-size: 3rem; font-weight: 700; letter-spacing: -0.02em; }
    .role { margin: 0 0 24px; font-size: 1.25rem; font-weight: 300; opacity: 0.9; text-transform: uppercase; letter-spacing: 0.1em; }
    
    .contact { display: flex; justify-content: center; gap: 24px; flex-wrap: wrap; font-size: 0.95rem; opacity: 0.95; }
    .contact p { margin: 0; display: flex; align-items: center; gap: 6px; }
    
    .content { padding: 40px 48px; display: grid; grid-template-columns: 1fr 240px; gap: 48px; }
    
    h2 { margin: 0 0 20px; font-size: 1.25rem; color: #1e293b; border-bottom: 2px solid #e2e8f0; padding-bottom: 8px; position: relative; }
    h2::after { content: ''; position: absolute; left: 0; bottom: -2px; width: 40px; height: 2px; background: linear-gradient(135deg, #6366f1 0%, #a855f7 100%); }
    
    .section { margin-bottom: 32px; }
    .info { line-height: 1.7; font-size: 0.95rem; color: #64748b; }
    .info p { margin: 0 0 12px; }
    
    .info strong { color: #334155; font-weight: 600; }
    
    /* Builders override */
    .side-col .info span[style] { background: #f1f5f9 !important; color: #334155 !important; padding: 4px 10px; border-radius: 999px; font-size: 0.85rem; font-weight: 500; display: inline-block; margin: 0 4px 8px 0; border: 1px solid #e2e8f0; }
    
    @media print { 
      body { -webkit-print-color-adjust: exact; print-color-adjust: exact; } 
      .page { margin: 0; box-shadow: none; } 
    }
  </style>
</head>
<body>
  <div class="page">
    <header class="header">
      <h1 class="name">{{fullName}}</h1>
      <p class="role">{{jobTitle}}</p>
      <div class="contact">
        <p>{{email}}</p>
        <p>{{phone}}</p>
        <p>{{location}}</p>
        <p>{{website}}</p>
      </div>
    </header>
    
    <div class="content">
      <div class="main-col">
        <section class="section">
          <h2>Profile</h2>
          <div class="info"><p>{{summary}}</p></div>
        </section>
        <section class="section">
          <h2>Experience</h2>
          <div class="info">{{experienceBlocks}}</div>
        </section>
        <section class="section" style="display:{{projectsSectionDisplay}}">
          <h2>Projects</h2>
          <div class="info">{{projectBlocks}}</div>
        </section>
      </div>
      
      <div class="side-col">
        <section class="section">
          <h2>Skills</h2>
          <div class="info">{{skillsBlock}}</div>
        </section>
        <section class="section">
          <h2>Education</h2>
          <div class="info">{{educationBlocks}}</div>
        </section>
        <section class="section">
          <h2>Certifications</h2>
          <div class="info">{{certificationBlocks}}</div>
        </section>
        <section class="section">
          <h2>Languages</h2>
          <div class="info">{{languagesBlock}}</div>
        </section>
      </div>
    </div>
  </div>
</body>
</html>
