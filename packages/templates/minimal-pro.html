<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>{{fullName}} - Resume</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Libre+Baskerville:ital,wght@0,400;0,700;1,400&family=Source+Sans+3:wght@300;400;600&display=swap');
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: 'Source Sans 3', sans-serif; color: #333; background: #fff; }
  .page { width: 794px; min-height: 1123px; margin: 0 auto; padding: 72px 80px; }
  .header { text-align: center; margin-bottom: 40px; padding-bottom: 32px; border-bottom: 1px solid #e0e0e0; }
  .header h1 { font-family: 'Libre Baskerville', serif; font-size: 32px; font-weight: 700; letter-spacing: 1px; color: #1a1a1a; margin-bottom: 6px; }
  .header .title { font-size: 13px; font-weight: 300; letter-spacing: 3px; text-transform: uppercase; color: #888; margin-bottom: 16px; }
  .contact-row { display: flex; justify-content: center; gap: 20px; flex-wrap: wrap; }
  .contact-row span { font-size: 12px; color: #666; }
  .contact-divider { color: #ccc; }
  section { margin-bottom: 32px; }
  section h2 { font-family: 'Libre Baskerville', serif; font-size: 11px; font-weight: 700; letter-spacing: 3px; text-transform: uppercase; color: #aaa; margin-bottom: 16px; }
  .summary { font-size: 13px; line-height: 1.9; color: #555; font-family: 'Libre Baskerville', serif; font-style: italic; }
  .exp-item { display: grid; grid-template-columns: 120px 1fr; gap: 20px; margin-bottom: 20px; }
  .exp-meta { text-align: right; }
  .exp-date { font-size: 11px; color: #aaa; line-height: 1.6; }
  .exp-company { font-size: 11px; color: #aaa; }
  .exp-title { font-size: 13px; font-weight: 600; color: #1a1a1a; margin-bottom: 3px; }
  .exp-org { font-size: 12px; color: #777; margin-bottom: 8px; }
  .exp-list { list-style: none; padding: 0; }
  .exp-list li { font-size: 12px; color: #555; line-height: 1.7; padding-left: 12px; position: relative; margin-bottom: 2px; }
  .exp-list li::before { content: '–'; position: absolute; left: 0; color: #ccc; }
  .skills-grid { display: flex; flex-wrap: wrap; gap: 8px; }
  .skill-tag { font-size: 12px; color: #444; border: 1px solid #e0e0e0; padding: 4px 12px; border-radius: 2px; }
  .edu-row { display: grid; grid-template-columns: 120px 1fr; gap: 20px; margin-bottom: 14px; }
  .edu-year { font-size: 11px; color: #aaa; text-align: right; }
  .edu-degree { font-size: 13px; font-weight: 600; color: #1a1a1a; }
  .edu-school { font-size: 12px; color: #777; }
  .cert-row { display: grid; grid-template-columns: 120px 1fr; gap: 20px; margin-bottom: 10px; }
  @media print { body { -webkit-print-color-adjust: exact; print-color-adjust: exact; } .page { padding: 40px; } }
</style>
</head>
<body>
<div class="page">
  <div class="header">
    <h1>{{fullName}}</h1>
    <div class="title">{{jobTitle}}</div>
    <div class="contact-row">
      <span>{{email}}</span><span class="contact-divider">·</span>
      <span>{{phone}}</span><span class="contact-divider">·</span>
      <span>{{location}}</span><span class="contact-divider">·</span>
      <span>{{linkedin}}</span>
    </div>
  </div>
  <section>
    <h2>Profile</h2>
    <p class="summary">{{summary}}</p>
  </section>
  <section>
    <h2>Experience</h2>
    {{experienceBlocks}}
  </section>
  <section>
    <h2>Education</h2>
    {{educationBlocks}}
  </section>
  <section>
    <h2>Skills</h2>
    <div class="skills-grid">
      {{skillsBlock}}
    </div>
  </section>
  <section>
    <h2>Languages</h2>
    {{languagesBlock}}
  </section>
  <section>
    <h2>Certifications</h2>
    {{certificationBlocks}}
  </section>
  <section style="display:{{projectsSectionDisplay}}">
    <h2>Projects</h2>
    {{projectBlocks}}
  </section>
</div>
</body>
</html>
