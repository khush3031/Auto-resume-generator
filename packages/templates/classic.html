<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Classic Resume</title>
  <style>
    :root { --accent: var(--resume-accent-color, #0f3d5c); }
    body { margin: 0; font-family: 'Playfair Display', Georgia, serif; color: #102a43; background: #fff; }
    .page { width: 794px; max-width: 794px; margin: 0 auto; padding: 40px; }
    .page::after { content: ''; display: table; clear: both; }
    header { border-bottom: 3px solid var(--accent); padding-bottom: 18px; margin-bottom: 24px; }
    .name { font-size: 3rem; letter-spacing: -0.05em; margin: 0; }
    .title { color: #334e68; font-size: 1.1rem; text-transform: uppercase; letter-spacing: 0.2em; margin-top: 8px; }
    h2 { margin: 0 0 12px; font-size: 1.1rem; text-transform: uppercase; letter-spacing: 0.18em; color: var(--accent); }
    .section { margin-bottom: 24px; }
    .section p, .section li { line-height: 1.7; }
    .meta { color: #334e68; font-size: 0.95rem; display: flex; flex-wrap: wrap; gap: 10px; }
    /* Sidebar floats right — height = its content only.
       Main sections flow beside it and expand to full width once sidebar ends. */
    .sidebar {
      float: right;
      width: 210px;
      margin-left: 28px;
      padding: 20px 20px 20px 24px;
      border-left: 2px solid var(--accent);
      background: var(--accent);
      color: #fff;
    }
    .sidebar h3 { margin-top: 0; color: #fff; margin-bottom: 10px; font-size: 1rem; text-transform: uppercase; letter-spacing: 0.18em; }
    /* Sidebar block overrides — block builders emit inline styles unreadable on dark bg */
    .sidebar span[style]  { color: rgba(255,255,255,0.85) !important; background: rgba(255,255,255,0.15) !important; }
    .sidebar div[style]   { color: rgba(255,255,255,0.82) !important; }
    .sidebar strong       { color: #fff !important; }
    .skill-pill { display: inline-block; margin: 3px 5px 3px 0; padding: 6px 10px; border: 1px solid rgba(255,255,255,0.5); border-radius: 999px; font-size: 0.85rem; color: #fff; }
    ul { margin: 0; padding-left: 18px; }
    .contact { display: grid; grid-template-columns: repeat(2, minmax(0, 1fr)); gap: 8px; font-size: 0.95rem; }
    .contact span { display: block; }
    .cert-entry { margin-bottom: 12px; padding-bottom: 10px; border-bottom: 1px solid rgba(0,0,0,0.08); }
    .cert-name { font-size: 12px; font-weight: 600; color: inherit; }
    .cert-meta { font-size: 11px; opacity: 0.75; margin-top: 2px; }
    @media print { body { -webkit-print-color-adjust: exact; print-color-adjust: exact; } .page { margin: 0; box-shadow: none; } }
  </style>
</head>
<body>
  <div class="page">
    <header>
      <p class="name">{{fullName}}</p>
      <p class="title">{{jobTitle}}</p>
      <div class="contact">
        <span>{{email}}</span>
        <span>{{phone}}</span>
        <span>{{location}}</span>
        <span>{{website}}</span>
      </div>
    </header>
    <!-- Sidebar must appear before main sections in DOM for float-right to work -->
    <aside class="sidebar">
      <section class="section">
        <h3>Skills</h3>
        {{skillsBlock}}
      </section>
      <section class="section">
        <h3>Languages</h3>
        {{languagesBlock}}
      </section>
      <section class="section">
        <h3>Certifications</h3>
        {{certificationBlocks}}
      </section>
    </aside>
    <!-- Main sections: no BFC — content lines naturally expand to full width once sidebar ends -->
    <section class="section">
      <h2>Profile</h2>
      <p>{{summary}}</p>
    </section>
    <section class="section">
      <h2>Experience</h2>
      {{experienceBlocks}}
    </section>
    <section class="section" style="display:{{projectsSectionDisplay}}">
      <h2>Projects</h2>
      {{projectBlocks}}
    </section>
    <section class="section">
      <h2>Education</h2>
      {{educationBlocks}}
    </section>
  </div>
</body>
</html>
