<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Pinstripe Resume</title>
  <style>
    :root {
      --accent: var(--resume-accent-color, #7c2d12);
      --ink: #1f2937;
      --muted: #6b7280;
      --line: #e5ded8;
      --soft: #fcfaf8;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: #f4efe9; color: var(--ink); font-family: Georgia, "Times New Roman", serif; }
    .page { width: 794px; min-height: 1123px; margin: 0 auto; background: #ffffff; }
    .layout { display: grid; grid-template-columns: 18px 1fr; min-height: 1123px; }
    .stripe { background: linear-gradient(180deg, #3b1d16 0%, var(--accent) 100%); }
    .shell { padding: 36px 34px 30px 28px; }
    .hero { margin-bottom: 20px; }
    .name { font-size: 36px; line-height: 0.96; font-weight: 700; letter-spacing: -0.03em; margin-bottom: 8px; }
    .role {
      font-size: 12px;
      color: var(--accent);
      letter-spacing: 0.24em;
      text-transform: uppercase;
      font-weight: 700;
      margin-bottom: 12px;
    }
    .contact-row {
      display: flex;
      flex-wrap: wrap;
      gap: 8px 14px;
      font-size: 11px;
      color: var(--muted);
      margin-bottom: 14px;
    }
    .summary {
      border-left: 2px solid var(--accent);
      padding-left: 14px;
      font-size: 12.5px;
      line-height: 1.76;
      color: #374151;
      max-width: 620px;
    }
    .body { display: grid; grid-template-columns: 1.1fr 0.9fr; gap: 18px; }
    .section { margin-bottom: 18px; }
    .section h2 {
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.2em;
      color: var(--accent);
      font-weight: 700;
      padding-bottom: 7px;
      margin-bottom: 10px;
      border-bottom: 1px solid var(--line);
    }
    .panel {
      border: 1px solid var(--line);
      background: var(--soft);
      padding: 14px 16px 12px;
    }

    @media print {
      body {
        -webkit-print-color-adjust: exact;
        print-color-adjust: exact;
      }

      .page {
        margin: 0;
      }
    }
  </style>
</head>
<body>
  <div class="page">
    <div class="layout">
      <div class="stripe"></div>
      <div class="shell">
        <header class="hero">
          <div class="name">{{fullName}}</div>
          <div class="role">{{jobTitle}}</div>
          <div class="contact-row">
            <span>{{email}}</span>
            <span>{{phone}}</span>
            <span>{{location}}</span>
            <span>{{linkedin}}</span>
            <span>{{website}}</span>
          </div>
          <p class="summary">{{summary}}</p>
        </header>

        <div class="body">
          <main>
            <section class="section">
              <h2>Experience</h2>
              {{experienceBlocks}}
            </section>

            <section class="section" style="display:{{projectsSectionDisplay}}">
              <h2>Projects</h2>
              {{projectBlocks}}
            </section>
          </main>

          <aside>
            <section class="section panel">
              <h2>Education</h2>
              {{educationBlocks}}
            </section>

            <section class="section panel">
              <h2>Skills</h2>
              {{skillsBlock}}
            </section>

            <section class="section panel">
              <h2>Certifications</h2>
              {{certificationBlocks}}
            </section>

            <section class="section panel">
              <h2>Languages</h2>
              {{languagesBlock}}
            </section>
          </aside>
        </div>
      </div>
    </div>
  </div>
</body>
</html>
