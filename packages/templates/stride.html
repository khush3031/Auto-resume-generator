<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Stride Resume</title>
  <style>
    :root {
      --accent: var(--resume-accent-color, #0f766e);
      --ink: #0f172a;
      --muted: #4b5563;
      --line: #d7e6e3;
      --soft: #f4fbfa;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: #edf6f4; color: var(--ink); font-family: "Aptos", "Segoe UI", Arial, sans-serif; }
    .page { width: 794px; min-height: 1123px; margin: 0 auto; background: #ffffff; }
    .shell { padding: 32px 34px 30px; }
    .hero {
      display: flex;
      justify-content: space-between;
      gap: 20px;
      align-items: flex-start;
      padding: 0 0 16px;
      margin-bottom: 18px;
      border-bottom: 1px solid var(--line);
    }
    .name { font-size: 34px; line-height: 0.98; font-weight: 800; letter-spacing: -0.03em; margin-bottom: 7px; }
    .role {
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: 0.22em;
      color: var(--accent);
      font-weight: 800;
      margin-bottom: 10px;
    }
    .summary { max-width: 470px; font-size: 12.5px; line-height: 1.76; color: #334155; }
    .contact-stack {
      flex: 0 0 230px;
      display: grid;
      gap: 8px;
      font-size: 10.5px;
      color: var(--muted);
      text-align: right;
      overflow-wrap: anywhere;
    }
    .body { display: grid; grid-template-columns: 1.16fr 0.84fr; gap: 18px; }
    .section { margin-bottom: 16px; }
    .section h2 {
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: 0.22em;
      color: var(--accent);
      font-weight: 800;
      margin-bottom: 10px;
    }
    .card {
      border: 1px solid var(--line);
      border-radius: 20px;
      padding: 14px 16px 12px;
      background: #ffffff;
    }
    .card-soft {
      border: 1px solid var(--line);
      border-radius: 20px;
      padding: 14px 16px 12px;
      background: var(--soft);
    }

    @media print {
      body {
        -webkit-print-color-adjust: exact;
        print-color-adjust: exact;
      }

      .page {
        margin: 0;
      }
    }
  </style>
</head>
<body>
  <div class="page">
    <div class="shell">
      <header class="hero">
        <div>
          <div class="name">{{fullName}}</div>
          <div class="role">{{jobTitle}}</div>
          <p class="summary">{{summary}}</p>
        </div>
        <div class="contact-stack">
          <span>{{email}}</span>
          <span>{{phone}}</span>
          <span>{{location}}</span>
          <span>{{linkedin}}</span>
          <span>{{website}}</span>
        </div>
      </header>

      <div class="body">
        <main>
          <section class="section">
            <h2>Experience</h2>
            <div class="card">{{experienceBlocks}}</div>
          </section>

          <section class="section" style="display:{{projectsSectionDisplay}}">
            <h2>Projects</h2>
            <div class="card">{{projectBlocks}}</div>
          </section>
        </main>

        <aside>
          <section class="section">
            <h2>Skills</h2>
            <div class="card-soft">{{skillsBlock}}</div>
          </section>

          <section class="section">
            <h2>Education</h2>
            <div class="card-soft">{{educationBlocks}}</div>
          </section>

          <section class="section">
            <h2>Certifications</h2>
            <div class="card-soft">{{certificationBlocks}}</div>
          </section>

          <section class="section">
            <h2>Languages</h2>
            <div class="card-soft">{{languagesBlock}}</div>
          </section>
        </aside>
      </div>
    </div>
  </div>
</body>
</html>
