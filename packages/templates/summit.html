<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Summit Resume</title>
  <style>
    :root {
      --accent: var(--resume-accent-color, #1d4f91);
      --ink: #10253d;
      --muted: #5a6c7d;
      --line: #dbe6f0;
      --soft: #f6faff;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: #edf3f9; color: var(--ink); font-family: "Segoe UI", Arial, sans-serif; }
    .page { width: 794px; min-height: 1123px; margin: 0 auto; background: #ffffff; }
    .hero {
      padding: 28px 34px 22px;
      background: linear-gradient(135deg, #0f2744 0%, var(--accent) 100%);
      color: #ffffff;
    }
    .hero-top {
      display: flex;
      justify-content: space-between;
      gap: 18px;
      align-items: flex-start;
      margin-bottom: 14px;
    }
    .name { font-size: 35px; line-height: 0.98; font-weight: 800; letter-spacing: -0.03em; margin-bottom: 7px; }
    .role {
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: 0.22em;
      color: rgba(255, 255, 255, 0.8);
      font-weight: 700;
    }
    .contact-grid {
      flex: 0 0 280px;
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 8px 12px;
      font-size: 10.5px;
      text-align: right;
      color: rgba(255, 255, 255, 0.92);
      overflow-wrap: anywhere;
    }
    .summary {
      max-width: 640px;
      font-size: 12.5px;
      line-height: 1.76;
      color: rgba(255, 255, 255, 0.92);
    }
    .shell { padding: 22px 34px 30px; }
    .body { display: grid; grid-template-columns: 1.1fr 0.9fr; gap: 18px; }
    .section { margin-bottom: 16px; }
    .section h2 {
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: 0.22em;
      color: var(--accent);
      font-weight: 800;
      margin-bottom: 10px;
    }
    .panel {
      border: 1px solid var(--line);
      border-radius: 20px;
      background: #ffffff;
      padding: 14px 16px 12px;
    }
    .panel-soft {
      border: 1px solid var(--line);
      border-radius: 20px;
      background: var(--soft);
      padding: 14px 16px 12px;
    }

    @media print {
      body {
        -webkit-print-color-adjust: exact;
        print-color-adjust: exact;
      }

      .page {
        margin: 0;
      }
    }
  </style>
</head>
<body>
  <div class="page">
    <header class="hero">
      <div class="hero-top">
        <div>
          <div class="name">{{fullName}}</div>
          <div class="role">{{jobTitle}}</div>
        </div>
        <div class="contact-grid">
          <span>{{email}}</span>
          <span>{{phone}}</span>
          <span>{{location}}</span>
          <span>{{linkedin}}</span>
          <span>{{website}}</span>
        </div>
      </div>
      <p class="summary">{{summary}}</p>
    </header>

    <div class="shell">
      <div class="body">
        <main>
          <section class="section">
            <h2>Experience</h2>
            <div class="panel">{{experienceBlocks}}</div>
          </section>

          <section class="section" style="display:{{projectsSectionDisplay}}">
            <h2>Projects</h2>
            <div class="panel">{{projectBlocks}}</div>
          </section>
        </main>

        <aside>
          <section class="section">
            <h2>Education</h2>
            <div class="panel-soft">{{educationBlocks}}</div>
          </section>

          <section class="section">
            <h2>Skills</h2>
            <div class="panel-soft">{{skillsBlock}}</div>
          </section>

          <section class="section">
            <h2>Certifications</h2>
            <div class="panel-soft">{{certificationBlocks}}</div>
          </section>

          <section class="section">
            <h2>Languages</h2>
            <div class="panel-soft">{{languagesBlock}}</div>
          </section>
        </aside>
      </div>
    </div>
  </div>
</body>
</html>
