<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Compact Resume</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Roboto:ital,wght@0,300;0,400;0,500;0,700;1,400&display=swap');
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Roboto', sans-serif; background: #fff; color: #212121; font-size: 12px; }
    .page { width: 794px; max-width: 794px; min-height: 1123px; margin: 0 auto; padding: 40px 52px; overflow: hidden; }
    .h-name { font-size: 26px; font-weight: 700; color: #212121; letter-spacing: -.5px; margin-bottom: 2px; }
    .h-title { font-size: 13px; font-weight: 400; color: #e53935; letter-spacing: .5px; margin-bottom: 10px; }
    .h-contact { display: flex; flex-wrap: wrap; gap: 0; border-top: 1px solid #e0e0e0; border-bottom: 1px solid #e0e0e0; padding: 6px 0; margin-bottom: 18px; }
    .h-contact span { font-size: 11.5px; color: #424242; padding-right: 14px; margin-right: 14px; border-right: 1px solid #e0e0e0; line-height: 1.6; }
    .h-contact span:last-child { border-right: none; }
    .section { margin-bottom: 16px; }
    .sec-title { font-size: 11px; font-weight: 700; letter-spacing: 2px; text-transform: uppercase; color: #e53935; border-bottom: 1.5px solid #e53935; padding-bottom: 4px; margin-bottom: 10px; }
    .summary-p { font-size: 12px; line-height: 1.75; color: #424242; font-weight: 300; }
    .exp-row { margin-bottom: 12px; }
    .er-header { display: flex; justify-content: space-between; align-items: baseline; }
    .er-role { font-size: 12.5px; font-weight: 700; color: #212121; }
    .er-date { font-size: 11px; color: #e53935; font-weight: 500; }
    .er-co { font-size: 11.5px; color: #616161; margin-bottom: 5px; font-style: italic; }
    .er-list { list-style: none; }
    .er-list li { font-size: 11.5px; color: #424242; line-height: 1.65; padding-left: 12px; position: relative; margin-bottom: 1px; }
    .er-list li::before { content: '–'; position: absolute; left: 0; color: #e53935; }
    .two-col { display: grid; grid-template-columns: 1fr 1fr; gap: 10px 30px; }
    .edu-row { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 6px; }
    .edu-left .deg { font-size: 12px; font-weight: 700; }
    .edu-left .uni { font-size: 11.5px; color: #616161; font-style: italic; }
    .edu-year { font-size: 11.5px; color: #e53935; font-weight: 500; }
    .skill-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 5px; }
    .skill-item { font-size: 11.5px; color: #424242; padding-left: 10px; position: relative; }
    .skill-item::before { content: '•'; position: absolute; left: 0; color: #e53935; }
    .lang-row { display: flex; justify-content: space-between; font-size: 11.5px; color: #424242; padding: 3px 0; border-bottom: 1px dotted #e0e0e0; }
    .cert-row { display: flex; justify-content: space-between; font-size: 11.5px; color: #424242; padding: 4px 0; border-bottom: 1px dotted #e0e0e0; }
    .cert-meta { color: #616161; font-size: 11px; }
    @media print { body { -webkit-print-color-adjust: exact; print-color-adjust: exact; } .page { margin: 0; padding: 30px 40px; } }
  </style>
</head>
<body>
  <div class="page">
    <div class="h-name">{{fullName}}</div>
    <div class="h-title">{{jobTitle}}</div>
    <div class="h-contact">
      <span>{{email}}</span>
      <span>{{phone}}</span>
      <span>{{location}}</span>
      <span>{{linkedin}}</span>
    </div>
    <div class="section">
      <div class="sec-title">Summary</div>
      <p class="summary-p">{{summary}}</p>
    </div>
    <div class="section">
      <div class="sec-title">Experience</div>
      {{experienceBlocks}}
    </div>
    <div class="section" style="display:{{projectsSectionDisplay}}">
      <div class="sec-title">Projects</div>
      {{projectBlocks}}
    </div>
    <div class="two-col">
      <div>
        <div class="section">
          <div class="sec-title">Education</div>
          {{educationBlocks}}
        </div>
        <div class="section">
          <div class="sec-title">Skills</div>
          {{skillsBlock}}
        </div>
      </div>
      <div>
        <div class="section">
          <div class="sec-title">Languages</div>
          {{languagesBlock}}
        </div>
        <div class="section">
          <div class="sec-title">Certifications</div>
          {{certificationBlocks}}
        </div>
      </div>
    </div>
  </div>
</body>
</html>
